<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
		 <style>
    .block-heading {
      color: #3b99e0;
      text-align: center;
      margin: 20px 0;
    }
			 </style>
</head>

<body>
	<div class="container">
    <div class="block-heading">
      <h2>Your Shopping Cart</h2>
      <p>Here is your selected items</p>
    </div>

    <div class="row">
      <div class="col-lg-8">
        <div class="product">
          <div class="row">
            <div class="col-md-6">
              <h5><a href="#">Product Name 1</a></h5>
              <p>Short description or details.</p>
            </div>
            <div class="col-md-6 d-flex justify-content-between">
              <img src="https://via.placeholder.com/100" class="img-fluid" alt="Product 1 image 1" />
              <img src="https://via.placeholder.com/100" class="img-fluid" alt="Image 2" />
              <img src="https://via.placeholder.com/100" class="img-fluid" alt="Image 3" />
            </div>
          </div>
        </div>
        <!-- Removed second product block to match 3 images total -->
      </div>

      <div class="col-lg-4">
        <div class="summary">
          <h4>Order Summary</h4>
          <p>Items: 1</p>
          <p>Total Price: $100</p>
          <button type="button">Checkout</button>
        </div>
      </div>
    </div>
  </div>

						 
	<script type="text/javascript" src="./script.js">
</script>

</body>

</html>
